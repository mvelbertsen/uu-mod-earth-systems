name: "Run unit tests"

on: [push, pull_request]

jobs:
  test:
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ./test/test_requirements.txt
    - name: Run tests
      run: python -m unittest
